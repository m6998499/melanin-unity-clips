name: Google Play Internal Testing

on:
  workflow_dispatch:

jobs:
  upload-internal-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run checks
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Verify static web assets
        run: pnpm build:static

      - name: Sync Capacitor Android project
        run: pnpm cap sync android

      - name: Decode signing keystore
        run: |
          test -n "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}"
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Configure signing properties
        run: |
          {
            echo "MUC_RELEASE_STORE_FILE=release-keystore.jks"
            echo "MUC_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}"
            echo "MUC_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}"
            echo "MUC_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}"
          } >> android/gradle.properties

      - name: Build signed release app bundle
        run: ./gradlew bundleRelease
        working-directory: android

      - name: Upload to internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.melaninunity.clips
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
