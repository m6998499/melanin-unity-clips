name: Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Verify static web assets
        run: pnpm build:static

      - name: Sync Capacitor Android project
        run: pnpm cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Decode signing keystore
        run: |
          test -n "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}"
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Configure signing properties
        run: |
          test -n "${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}"
          test -n "${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}"
          {
            echo "MUC_RELEASE_STORE_FILE=release-keystore.jks"
            echo "MUC_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}"
            echo "MUC_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}"
            echo "MUC_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}"
          } >> android/gradle.properties

      - name: Build release app bundle
        run: ./gradlew bundleRelease
        working-directory: android

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: melanin-unity-clips-v4-1.0.2-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
