[build]
  publish = "outputs/netlify-site"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"
  SECRETS_SCAN_OMIT_PATHS = "outputs/netlify-site/supabase-config.js,outputs/netlify-site/posts/*"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
